<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATC-Sequencer Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
</head>
<body>

<!-- HEADER -->
<nav class="navbar px-4 py-3 mb-4">
  <span class="navbar-brand fw-bold fs-4">
    <i class="bi bi-airplane-fill me-2"></i>ATC-Sequencer
  </span>
  <div class="d-flex align-items-center gap-3">
    <span id="ws-indicator" class="ws-badge ws-disconnected">
      <span class="dot"></span> WebSocket déconnecté
    </span>
    <span class="text-muted small" id="last-update"></span>
  </div>
</nav>

<!-- TOAST alertes -->
<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index:9999" id="toast-container"></div>

<!-- STATISTIQUES -->
<div class="container-fluid px-4">
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="stat-card stat-blue">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label"><i class="bi bi-airplane me-1"></i>Vols actifs</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card stat-orange">
        <div class="stat-value" id="stat-delayed">0</div>
        <div class="stat-label"><i class="bi bi-clock-history me-1"></i>En retard</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card stat-red">
        <div class="stat-value" id="stat-conflicts">0</div>
        <div class="stat-label"><i class="bi bi-exclamation-triangle me-1"></i>Conflits</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card stat-green">
        <div class="stat-value" id="stat-landed">0</div>
        <div class="stat-label"><i class="bi bi-check-circle me-1"></i>Atterris</div>
      </div>
    </div>
  </div>

  <!-- BOUTONS ACTIONS -->
  <div class="d-flex gap-2 mb-3 flex-wrap">
    <button class="btn btn-primary" onclick="openAddModal()">
      <i class="bi bi-plus-circle me-1"></i>Ajouter un vol
    </button>
    <button class="btn btn-warning" onclick="resequence()">
      <i class="bi bi-sort-numeric-down me-1"></i>Reséquencer
    </button>
    <button class="btn btn-secondary" onclick="refresh()">
      <i class="bi bi-arrow-clockwise me-1"></i>Rafraîchir
    </button>
  </div>

  <!-- CONTENU PRINCIPAL -->
  <div class="row g-3">

    <!-- TABLE SÉQUENCEMENT -->
    <div class="col-lg-8">
      <div class="panel">
        <div class="panel-header">
          <i class="bi bi-list-ol me-2"></i>Séquence de trafic
        </div>
        <div class="table-responsive">
          <table class="table table-dark table-hover mb-0">
            <thead>
              <tr>
                <th>#</th>
                <th>Vol</th>
                <th>Trajet</th>
                <th>Catégorie</th>
                <th>Retard</th>
                <th>Statut</th>
                <th>Piste</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="flights-table">
              <tr><td colspan="8" class="text-center text-muted py-4">Chargement...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- PANEL ALERTES -->
    <div class="col-lg-4">
      <div class="panel h-100">
        <div class="panel-header">
          <i class="bi bi-bell me-2"></i>Alertes & Conflits
        </div>
        <div id="alerts-panel" class="alerts-container">
          <p class="text-muted text-center mt-3">Aucune alerte</p>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL AJOUTER VOL -->
<div class="modal fade" id="addFlightModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header border-secondary">
        <h5 class="modal-title"><i class="bi bi-plus-circle me-2"></i>Ajouter un vol</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="add-flight-form">
          <div class="row g-2">
            <div class="col-6">
              <label class="form-label">ID Vol *</label>
              <input type="text" class="form-control bg-secondary text-white border-0" id="f-id" placeholder="AF123" required />
            </div>
            <div class="col-6">
              <label class="form-label">Call Sign *</label>
              <input type="text" class="form-control bg-secondary text-white border-0" id="f-callsign" placeholder="Air France 123" required />
            </div>
            <div class="col-6">
              <label class="form-label">Origine *</label>
              <input type="text" class="form-control bg-secondary text-white border-0" id="f-origin" placeholder="CDG" required />
            </div>
            <div class="col-6">
              <label class="form-label">Destination *</label>
              <input type="text" class="form-control bg-secondary text-white border-0" id="f-dest" placeholder="ABJ" required />
            </div>
            <div class="col-6">
              <label class="form-label">ETA</label>
              <input type="datetime-local" class="form-control bg-secondary text-white border-0" id="f-eta" />
            </div>
            <div class="col-6">
              <label class="form-label">Catégorie *</label>
              <select class="form-select bg-secondary text-white border-0" id="f-category" required>
                <option value="COMMERCIAL">COMMERCIAL</option>
                <option value="CARGO">CARGO</option>
                <option value="MEDICAL">MEDICAL</option>
                <option value="MILITARY">MILITARY</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label">Piste *</label>
              <input type="text" class="form-control bg-secondary text-white border-0" id="f-runway" placeholder="A" required />
            </div>
            <div class="col-6">
              <label class="form-label">Retard (min)</label>
              <input type="number" class="form-control bg-secondary text-white border-0" id="f-delay" value="0" min="0" />
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        <button type="button" class="btn btn-primary" onclick="submitAddFlight()">
          <i class="bi bi-plus me-1"></i>Ajouter
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.6.1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
<script src="js/app.js"></script>
<script src="js/websocket.js"></script>
</body>
</html>
